<svg width="900" height="600" viewBox="200 80 500 380" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72"/>
      <stop offset="100%" stop-color="#2a5298"/>
    </linearGradient>

    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1ec6b6"/>
      <stop offset="100%" stop-color="#159f9f"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9d423"/>
      <stop offset="100%" stop-color="#f4a100"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Left Shield -->
  <path d="M350 120 
           Q300 150 300 220 
           Q300 300 350 340 
           Q400 300 400 220 
           Q400 150 350 120 Z"
        fill="url(#blueGrad)" filter="url(#shadow)"/>

  <!-- Right Shield -->
  <path d="M500 120 
           Q450 150 450 220 
           Q450 300 500 340 
           Q550 300 550 220 
           Q550 150 500 120 Z"
        fill="url(#tealGrad)" filter="url(#shadow)"/>

  <!-- Coin -->
  <circle cx="350" cy="220" r="45" fill="url(#goldGrad)" stroke="#d48b00" stroke-width="4"/>
  <line x1="320" y1="200" x2="380" y2="240" stroke="#ffffff88" stroke-width="6"/>

  <!-- Wallet -->
  <rect x="470" y="190" width="70" height="60" rx="12" fill="#e6ffff" stroke="#159f9f" stroke-width="3"/>
  <rect x="490" y="210" width="30" height="25" rx="5" fill="#159f9f"/>
  <circle cx="505" cy="220" r="5" fill="white"/>

  <!-- VS Text -->
  <text x="425" y="230" text-anchor="middle" font-size="48" font-family="Arial, Helvetica, sans-serif" fill="#ffffff" font-weight="bold">
    VS
  </text>

  <!-- Brand Name -->
  <text x="450" y="420" text-anchor="middle" font-size="72" font-family="Arial, Helvetica, sans-serif" fill="#142b4d" font-weight="bold" letter-spacing="4">
    CHATUTU
  </text>
  </svg>